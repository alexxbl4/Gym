<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>MoonPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="toast" class="toast hidden">
    <span id="toast-msg"></span>
  </div>

  <div id="modal-confirm" class="modal hidden">
    <div class="modal-card">
      <div class="modal-icon blue">
        <i data-lucide="help-circle"></i>
      </div>
      <h3 id="confirm-title">Confirmar</h3>
      <p id="confirm-body">¿Seguro que quieres continuar?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-secondary">Cancelar</button>
        <button id="confirm-ok" class="btn btn-primary">Aceptar</button>
      </div>
    </div>
  </div>

  <main id="screen-main" class="screen">
    <header class="page-header">
      <h1>MOON<span>PRO</span></h1>
    </header>

    <section class="panel">
      <div class="section-head">
        <h2>Rutinas</h2>
        <button id="new-routine-btn" class="btn btn-primary small">Nueva rutina</button>
      </div>
      <div id="routine-list" class="stack"></div>
    </section>
  </main>

  <section id="screen-editor" class="screen hidden">
    <header class="page-header editor-header">
      <button id="back-main-btn" class="btn btn-ghost small">Atrás</button>
      <h1>Editor</h1>
      <button id="save-routine-btn" class="btn btn-primary small">Guardar</button>
    </header>

    <div class="panel">
      <input id="routine-name" class="input-main" type="text" placeholder="Nombre de la rutina" />
    </div>

    <div id="exercise-list" class="stack"></div>

    <div class="editor-actions">
      <button id="add-exercise-btn" class="btn btn-secondary">+ Añadir ejercicio</button>
    </div>
  </section>

  <template id="routine-card-template">
    <article class="card routine-card">
      <div>
        <p class="eyebrow">Rutina</p>
        <h3 class="routine-name"></h3>
        <p class="routine-meta"></p>
      </div>
      <div class="card-actions">
        <button class="btn btn-secondary small action-edit">Editar</button>
        <button class="btn btn-danger small action-delete">Borrar</button>
      </div>
    </article>
  </template>

  <template id="exercise-card-template">
    <article class="card exercise-card">
      <div class="exercise-top">
        <input class="exercise-name input-inline" type="text" placeholder="Nombre del ejercicio" />
        <button class="icon-btn action-remove-exercise" aria-label="Eliminar ejercicio">
          <i data-lucide="trash-2"></i>
        </button>
      </div>

      <div class="exercise-config">
        <label>
          <span>Descanso</span>
          <input class="exercise-rest input-mini" type="number" min="0" step="5" value="90" />
        </label>

        <label class="toggle-wrap">
          <span>Cardio</span>
          <input class="exercise-cardio" type="checkbox" />
        </label>
      </div>

      <div class="sets-head">
        <span>#</span>
        <span class="grow">KG / KM</span>
        <span class="grow">REPS / MIN</span>
        <span></span>
      </div>

      <div class="sets-list stack-sm"></div>

      <button class="btn btn-ghost small action-add-set">+ Añadir serie</button>
    </article>
  </template>

  <template id="set-row-template">
    <div class="set-row">
      <span class="set-index"></span>
      <input class="set-weight input-mini grow" type="number" step="any" placeholder="0" />
      <input class="set-reps input-mini grow" type="number" step="any" placeholder="0" />
      <button class="icon-btn action-remove-set" aria-label="Eliminar serie">
        <i data-lucide="minus"></i>
      </button>
    </div>
  </template>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
