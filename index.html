<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Pro Elite v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: #121214; border: 1px solid rgba(255,255,255,0.05); }
        .input-gym { background: #1c1c1e; border-radius: 8px; text-align: center; font-weight: bold; padding: 5px; outline: none; }
        .input-gym:focus { border: 1px solid #3b82f6; }
        .hidden { display: none; }
        .tab-active { color: #3b82f6; }
    </style>
</head>
<body class="pb-32">

    <div id="screen-train" class="p-6">
        <header class="py-8">
            <h1 class="text-4xl font-black">ENTRENAR</h1>
            <p class="text-slate-500 font-bold mt-1 text-xs tracking-widest uppercase">Tus Rutinas</p>
        </header>

        <div id="routine-list" class="space-y-4"></div>

        <button onclick="addNewRoutine()" class="w-full mt-6 py-4 border-2 border-dashed border-zinc-800 rounded-3xl text-zinc-500 font-bold flex items-center justify-center gap-2">
            <i data-lucide="plus-circle"></i> Nueva Rutina
        </button>
    </div>

    <div id="screen-progress" class="hidden p-6">
        <header class="py-8">
            <h1 class="text-4xl font-black text-blue-500">PROGRESO</h1>
            <p class="text-slate-500 font-bold mt-1 text-xs tracking-widest uppercase">Records por ejercicio</p>
        </header>
        <div id="exercise-stats" class="space-y-3"></div>
    </div>

    <div id="session-screen" class="hidden fixed inset-0 bg-black z-50 overflow-y-auto pb-40">
        <header class="p-6 bg-zinc-950 border-b border-white/5 sticky top-0 z-10 flex justify-between items-center">
            <div>
                <h2 id="active-routine-name" class="text-xl font-black">Sesión</h2>
                <p id="session-timer" class="text-blue-500 font-mono font-bold">00:00:00</p>
            </div>
            <button onclick="finishSession()" class="bg-blue-600 px-6 py-3 rounded-2xl font-black text-sm">FINALIZAR</button>
        </header>

        <main id="active-exercises" class="p-4 space-y-6"></main>

        <div class="p-6">
            <button onclick="addExerciseToActive()" class="w-full py-4 bg-zinc-900 rounded-2xl font-bold text-slate-400"> + Añadir Ejercicio </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-zinc-950/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-8 z-40">
        <button onclick="showScreen('train')" id="nav-train" class="flex flex-col items-center tab-active"><i data-lucide="play"></i><span class="text-[10px] font-bold">Entreno</span></button>
        <button onclick="showScreen('progress')" id="nav-progress" class="flex flex-col items-center text-zinc-600"><i data-lucide="line-chart"></i><span class="text-[10px] font-bold">Progreso</span></button>
    </nav>

    <script>
        // --- DATA ---
        let routines = JSON.parse(localStorage.getItem('gym_v7_routines')) || {
            "Full Body": [{ name: "Sentadilla", sets: [{weight: 60, reps: 10}, {weight: 60, reps: 10}] }]
        };
        let stats = JSON.parse(localStorage.getItem('gym_v7_stats')) || {}; // { "Sentadilla": 80 }
        let currentSession = { start: null, timer: null, exercises: [] };

        function init() {
            renderRoutines();
            renderProgress();
            lucide.createIcons();
        }

        function showScreen(screen) {
            document.getElementById('screen-train').classList.toggle('hidden', screen !== 'train');
            document.getElementById('screen-progress').classList.toggle('hidden', screen !== 'progress');
            document.getElementById('nav-train').classList.toggle('tab-active', screen === 'train');
            document.getElementById('nav-progress').classList.toggle('tab-active', screen === 'progress');
            if(screen === 'progress') renderProgress();
        }

        function renderRoutines() {
            const list = document.getElementById('routine-list');
            list.innerHTML = Object.keys(routines).map(name => `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center">
                    <div onclick="startSession('${name}')" class="flex-1">
                        <h3 class="text-xl font-extrabold">${name}</h3>
                        <p class="text-zinc-500 text-xs font-bold">${routines[name].length} ejercicios</p>
                    </div>
                    <button onclick="deleteRoutine('${name}')" class="text-zinc-800 p-2"><i data-lucide="trash-2"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteRoutine(name) {
            if(confirm(`¿Borrar rutina "${name}"?`)) {
                delete routines[name];
                localStorage.setItem('gym_v7_routines', JSON.stringify(routines));
                renderRoutines();
            }
        }

        function startSession(name) {
            currentSession.start = Date.now();
            currentSession.exercises = JSON.parse(JSON.stringify(routines[name]));
            document.getElementById('active-routine-name').innerText = name;
            document.getElementById('session-screen').classList.remove('hidden');
            currentSession.timer = setInterval(updateTimer, 1000);
            renderActiveExercises();
        }

        function updateTimer() {
            const diff = Date.now() - currentSession.start;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${h}:${m}:${s}`;
        }

        function renderActiveExercises() {
            const container = document.getElementById('active-exercises');
            container.innerHTML = currentSession.exercises.map((ex, exIdx) => `
                <div class="glass p-5 rounded-3xl">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-black text-blue-500">${ex.name}</h4>
                        <button onclick="removeExercise(${exIdx})" class="text-zinc-700"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-[10px] text-zinc-500 font-bold uppercase mb-2 text-center">
                        <span>Serie</span><span>KG</span><span>Reps</span><span></span>
                    </div>
                    <div id="sets-${exIdx}" class="space-y-2">
                        ${ex.sets.map((set, setIdx) => `
                            <div class="grid grid-cols-4 gap-2 items-center">
                                <div class="bg-zinc-800 rounded-lg py-2 text-center font-bold">${setIdx + 1}</div>
                                <input type="number" value="${set.weight}" onchange="updateSet(${exIdx}, ${setIdx}, 'weight', this.value)" class="input-gym">
                                <input type="number" value="${set.reps}" onchange="updateSet(${exIdx}, ${setIdx}, 'reps', this.value)" class="input-gym">
                                <button onclick="removeSet(${exIdx}, ${setIdx})" class="text-red-900"><i data-lucide="minus-circle" class="w-4 h-4 mx-auto"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addSet(${exIdx})" class="w-full mt-4 py-2 bg-zinc-800 rounded-xl text-xs font-bold text-zinc-400">+ Añadir Serie</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateSet(exIdx, setIdx, field, val) { currentSession.exercises[exIdx].sets[setIdx][field] = parseFloat(val); }
        function addSet(exIdx) { 
            const lastSet = currentSession.exercises[exIdx].sets.slice(-1)[0] || {weight:0, reps:0};
            currentSession.exercises[exIdx].sets.push({...lastSet}); 
            renderActiveExercises(); 
        }
        function removeSet(exIdx, setIdx) { currentSession.exercises[exIdx].sets.splice(setIdx, 1); renderActiveExercises(); }
        function removeExercise(exIdx) { currentSession.exercises.splice(exIdx, 1); renderActiveExercises(); }

        function finishSession() {
            clearInterval(currentSession.timer);
            const routineName = document.getElementById('active-routine-name').innerText;
            
            // Actualizar Stats y Rutina
            currentSession.exercises.forEach(ex => {
                ex.sets.forEach(set => {
                    if(!stats[ex.name] || set.weight > stats[ex.name]) stats[ex.name] = set.weight;
                });
            });

            routines[routineName] = JSON.parse(JSON.stringify(currentSession.exercises));
            localStorage.setItem('gym_v7_routines', JSON.stringify(routines));
            localStorage.setItem('gym_v7_stats', JSON.stringify(stats));

            document.getElementById('session-screen').classList.add('hidden');
            init();
        }

        function renderProgress() {
            const container = document.getElementById('exercise-stats');
            container.innerHTML = Object.keys(stats).length ? '' : '<p class="text-center text-zinc-600 py-10">Entrena para ver tus records</p>';
            Object.keys(stats).sort().forEach(name => {
                container.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span class="font-bold">${name}</span>
                        <span class="text-blue-500 font-black">${stats[name]} <small class="text-[10px]">KG</small></span>
                    </div>
                `;
            });
        }

        function addNewRoutine() {
            const name = prompt("Nombre de la rutina:");
            if(name) { routines[name] = []; renderRoutines(); }
        }

        function addExerciseToActive() {
            const name = prompt("Nombre del ejercicio:");
            if(name) {
                currentSession.exercises.push({ name, sets: [{weight: 0, reps: 0}] });
                renderActiveExercises();
            }
        }

        init();
    </script>
</body>
</html>
