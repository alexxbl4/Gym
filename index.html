<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gym Pro Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; color: white; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none; /* Evita el rebote en iOS */
        }
        .glass { background: #121214; border: 1px solid rgba(255,255,255,0.08); }
        .input-gym { background: #1c1c1e; border-radius: 12px; text-align: center; font-weight: bold; padding: 10px; outline: none; width: 100%; font-size: 16px; color: white; border: 1px solid transparent; }
        .input-gym:focus { border-color: #3b82f6; }
        .row-done { background: rgba(16, 185, 129, 0.15) !important; border: 1px solid #10b981 !important; }
        .hidden { display: none !important; }
        .tab-active { color: #3b82f6; }
        .bar { width: 100%; background: #1e3a8a; border-radius: 4px 4px 0 0; position: relative; }
        .bar::after { content: attr(data-value); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: bold; color: #3b82f6; }
        /* Safe Area para iPhones modernos */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="safe-pt">

    <div id="rest-overlay" class="hidden fixed top-0 left-0 right-0 z-[200] bg-blue-600 p-6 text-center shadow-2xl safe-pt">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="text-left">
                <p class="text-[10px] font-black uppercase opacity-70">Descanso</p>
                <p id="rest-clock" class="text-3xl font-black">01:30</p>
            </div>
            <button onclick="stopRest()" class="bg-black/20 px-6 py-3 rounded-2xl font-black text-sm">SALTAR</button>
        </div>
    </div>

    <div id="screen-main" class="p-6 pb-32">
        <header class="py-10">
            <h1 class="text-4xl font-black italic tracking-tighter">GYM<span class="text-blue-500">PRO</span></h1>
            <p class="text-zinc-500 font-bold text-xs uppercase mt-1">Mis Rutinas</p>
        </header>
        <div id="routine-list" class="space-y-4"></div>
        <button onclick="openEditor()" class="w-full mt-8 py-5 border-2 border-dashed border-zinc-800 rounded-[2.5rem] text-zinc-400 font-bold flex items-center justify-center gap-2">
            <i data-lucide="plus"></i> Crear Nueva Rutina
        </button>
    </div>

    <div id="screen-editor" class="hidden fixed inset-0 bg-black z-[100] overflow-y-auto p-6 pb-32 safe-pt">
        <header class="flex justify-between items-center mb-8">
            <button onclick="closeEditor()" class="text-zinc-500 font-bold flex items-center gap-1"><i data-lucide="chevron-left"></i> Atrás</button>
            <h2 class="text-lg font-black italic uppercase">Diseño</h2>
            <button onclick="saveRoutine()" class="bg-blue-600 px-6 py-2 rounded-xl font-black text-xs">GUARDAR</button>
        </header>
        <input type="text" id="ed-name" placeholder="Nombre Rutina" class="w-full bg-zinc-900 rounded-2xl p-4 font-bold mb-4 outline-none border border-white/5">
        <div class="glass p-5 rounded-3xl mb-6 flex justify-between items-center">
            <span class="text-xs font-bold text-zinc-500 uppercase">Descanso Predet. (seg)</span>
            <input type="number" id="ed-rest" value="90" class="w-20 bg-transparent text-right font-black text-blue-500 outline-none text-xl">
        </div>
        <div id="ed-exercises" class="space-y-4"></div>
        <button onclick="addExerciseToEditor()" class="w-full mt-6 py-4 bg-zinc-900 rounded-2xl font-bold text-blue-500">+ Añadir Ejercicio</button>
    </div>

    <div id="screen-session" class="hidden fixed inset-0 bg-black z-[150] overflow-y-auto pb-40 safe-pt">
        <header class="p-6 bg-zinc-950/90 backdrop-blur-md sticky top-0 z-10 border-b border-white/5 flex justify-between items-center">
            <div>
                <h2 id="ses-title" class="text-xl font-black italic truncate max-w-[150px]">Entrenando</h2>
                <div class="flex gap-4 text-[10px] font-bold mt-1">
                    <span id="ses-timer" class="text-blue-500 font-mono">00:00</span>
                    <span class="text-zinc-500">VOL: <span id="ses-vol" class="text-white">0</span> KG</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="cancelSession()" class="bg-zinc-800 text-zinc-400 px-4 py-3 rounded-2xl font-black text-xs">SALIR</button>
                <button onclick="finishSession()" class="bg-green-600 px-6 py-3 rounded-2xl font-black text-xs">TERMINAR</button>
            </div>
        </header>
        <main id="ses-exercises" class="p-4 space-y-6 mt-2"></main>
    </div>

    <div id="screen-progress" class="hidden p-6 pb-32">
        <header class="py-10"><h1 class="text-4xl font-black italic tracking-tighter uppercase">Records</h1></header>
        <div id="progress-list" class="space-y-4"></div>
    </div>

    <div id="progress-modal" class="hidden fixed inset-0 bg-black z-[180] overflow-y-auto p-6 safe-pt">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closeProgressModal()" class="text-zinc-500 font-bold flex items-center gap-1"><i data-lucide="chevron-left"></i> Atrás</button>
            <h2 id="modal-ex-name" class="text-lg font-black text-blue-500 italic uppercase">Ejercicio</h2>
            <div class="w-10"></div> </div>
        <div class="glass p-6 rounded-[2.5rem] mb-6">
            <div id="chart-container" class="flex items-end justify-between h-40 gap-2 px-2 border-b border-zinc-800"></div>
        </div>
        <div id="history-log" class="space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-24 bg-zinc-950/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-8 z-50 safe-pb">
        <button onclick="nav('main')" id="n-main" class="flex flex-col items-center tab-active"><i data-lucide="dumbbell"></i><span class="text-[10px] font-bold mt-1">Rutinas</span></button>
        <button onclick="nav('progress')" id="n-progress" class="flex flex-col items-center text-zinc-600"><i data-lucide="bar-chart"></i><span class="text-[10px] font-bold mt-1">Progreso</span></button>
    </nav>

    <script>
        // --- PERSISTENCIA Y ESTADO ---
        let routines = JSON.parse(localStorage.getItem('gym_v11_routines')) || {};
        let history = JSON.parse(localStorage.getItem('gym_v11_history')) || {};
        let session = { active: false, start: null, timer: null, data: null, rest: 90 };
        let restInt = null, tempEd = [];

        // --- NAVEGACIÓN ---
        function nav(s) {
            if(session.active && s !== 'main') {
                if(!confirm("Tienes un entrenamiento activo. ¿Deseas salir a ver el progreso? El reloj seguirá contando.")) return;
            }
            document.getElementById('screen-main').classList.toggle('hidden', s!=='main');
            document.getElementById('screen-progress').classList.toggle('hidden', s!=='progress');
            document.getElementById('n-main').classList.toggle('tab-active', s==='main');
            document.getElementById('n-progress').classList.toggle('tab-active', s==='progress');
            if(s==='progress') renderProgressList();
            if(s==='main') renderRoutines();
            lucide.createIcons();
        }

        // --- EDITOR (CORREGIDO) ---
        function openEditor(name = null) {
            document.getElementById('screen-editor').classList.remove('hidden');
            document.getElementById('ed-name').value = name || "";
            const r = routines[name] || { rest: 90, exercises: [] };
            document.getElementById('ed-rest').value = r.rest;
            tempEd = JSON.parse(JSON.stringify(r.exercises));
            renderEditor();
        }
        function closeEditor() { document.getElementById('screen-editor').classList.add('hidden'); }
        function renderEditor() {
            const cont = document.getElementById('ed-exercises');
            cont.innerHTML = tempEd.map((ex, i) => `
                <div class="glass p-5 rounded-3xl">
                    <div class="flex justify-between items-center mb-4">
                        <input type="text
